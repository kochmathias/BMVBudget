<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vereinsbudget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .sidebar { min-height: 100vh; background: #198754; color: white; }
        .page-content { padding: 20px; }
    </style>
</head>
<body>

<div id="app" class="container-fluid hidden">
    <div class="row">
        <aside class="col-md-2 sidebar">
            <div class="p-3"><strong>Vereinsbudget</strong></div>
            <hr>
            <a href="#" class="nav-link text-white" onclick="navigate('dashboard')">Dashboard</a>
        </aside>
        <main class="col-md-10">
            <div id="page-dashboard" class="page-content">
                <h2>Dashboard</h2>
                <div class="row mt-4">
                    <div class="col-md-4"><div class="card p-3">Einnahmen: <h4 id="dash-budget-ein">0,00 €</h4></div></div>
                    <div class="col-md-4"><div class="card p-3">Ausgaben: <h4 id="dash-budget-aus">0,00 €</h4></div></div>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="loginScreen" class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center">Login</h3>
        <form id="loginForm">
            <input type="text" id="username" class="form-control mb-3" placeholder="Benutzername" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Passwort" required>
            <button type="submit" class="btn btn-success w-100">Anmelden</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
